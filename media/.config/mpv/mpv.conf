# --- Window & UI ---
geometry=50%:50%                # force starting with centered window
autofit-larger=90%x90%          # don't allow a new window to have a
                                # size larger than 90% of the screen
                                # size
save-position-on-quit=yes       # saves the seekbar position on exit
ignore-path-in-watch-later-config=yes
stop-screensaver=yes
osd-scale-by-window=no          # osd font, resizing with window

# --- Audio & OSC ---
osc=yes                         # Disable/enable the On Screen
                                # Controller (OSC).
volume=70
volume-max=200

# --- Playback ---
loop-file=inf                   # infinite loop by default

# --- Screenshots ---
screenshot-directory=~/Pictures/mpv/
screenshot-template=m_%F-%n

# --- Video Output & Performance Fixes ---
vo=gpu-next
gpu-api=auto

# CHANGE THIS: 'auto-safe' only tries methods known to be stable.
# If you still get lag, change this to 'no' to use your CPU for decoding
# (which is usually fast enough for AV1 on modern systems anyway).
hwdec=no

# OPTIONAL: Force mpv to skip the broken VDPAU backend search
vd-lavc-dr=yes

# --- IPC ---
# https://alexherbo2.github.io/config/mpv/control-mpv-from-the-command-line/
input-ipc-server=~~/socket

# Youtube videos play with 720p
ytdl-format="bestvideo[height<=720]+bestaudio/best[height<=720]"
