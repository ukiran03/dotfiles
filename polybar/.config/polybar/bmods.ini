[module/tray]
type = internal/tray
tray-position = right
tray-detached = false
tray-maxsize = 16
tray-background = ${color.background}
tray-offset-x = 0
tray-offset-y = 0
tray-spacing = 3
tray-padding = 0
tray-scale = 1.0

[module/notifs]
type = custom/script
; exec = dunstctl count history
exec = ~/.config/polybar/scripts/dunst-0.sh
interval = 1
; format = <label>
format-prefix = "N "
format-prefix-foreground = ${color.blue-gray}
label = %output%
; click-left = ~/.scripts/dunst-popall
click-left = ~/.local/bin/dunst-popall
click-right = dunstctl history-clear

[module/alsa]
type = internal/alsa

; Soundcard to be used
; Usually in the format hw:# where # is the card number
; You can find the different card numbers in `/proc/asound/cards`

master-soundcard = default
speaker-soundcard = default
headphone-soundcard = default

; Name of the master, speaker and headphone mixers
; Use the following command to list available mixer controls:
; $ amixer scontrols | sed -nr "s/.*'([[:alnum:]]+)'.*/\1/p"
; If master, speaker or headphone-soundcard isn't the default,
; use `amixer -c # scontrols` instead where # is the number
; of the master, speaker or headphone soundcard respectively
;
; Default: Master
master-mixer = Master

; Optionally define speaker and headphone mixers
; Default: none
;;speaker-mixer = Speaker
; Default: none
;;headphone-mixer = Headphone

; NOTE: This is required if headphone_mixer is defined
; Use the following command to list available device controls
; $ amixer controls | sed -r "/CARD/\!d; s/.*=([0-9]+).*name='([^']+)'.*/printf '%3.0f: %s\n' '\1' '\2'/e" | sort
; You may also need to use `amixer -c # controls` as above for the mixer names
; Default: none
;;headphone-id = 9

; Use volume mapping (similar to amixer -M and alsamixer), where the increase in volume is linear to the ear
; Default: false
;;mapped = true

; Interval for volume increase/decrease (in percent points)
; Default: 5
interval = 2

format-volume = <ramp-volume> <label-volume>

format-muted = <label-muted>
format-muted-prefix = "M"
format-muted-prefix-foreground = ${color.red}

label-volume = %percentage%%

label-muted = " Muted"
label-muted-foreground = ${color.sep}

; Only applies if <ramp-volume> is used
ramp-volume-0 = V
ramp-volume-1 = V
ramp-volume-2 = VV
ramp-volume-foreground = ${color.blue}

ramp-headphones-0 = H
ramp-headphones-background = ${color.blue}
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/mpd]
type = internal/mpd

interval = 1

format-online = <label-song> <toggle>
; format-stopped = <icon-stop>
; format-online-prefix = Sn
; format-online-prefix = 
format-online-prefix = 󰎇
format-online-prefix-foreground = ${color.amber}

format-offline = <label-offline>
format-offline-prefix = X
format-offline-prefix-foreground = ${color.red}

; label-song =  " %title% - %artist%"
label-song =  " %title%"
label-song-maxlen = 25
label-song-ellipsis = true

label-offline = " Offline"

; Only applies if <icon-X> is used
icon-stop = S
icon-stop-foreground = ${color.red}
icon-play = -P-
icon-play-foreground = ${color.red}
icon-pause = -PP-
icon-pause-foreground = ${color.green}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
full-at = 99

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT1
adapter = ACAD

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 2

; see "man date" for details on how to format the time string
; NOTE: if you want to use syntax tags here you need to use %%{...}
; Default: %H:%M:%S
time-format = %H:%M

; Available tags:
;   <label-charging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-charging>
format-charging = <label-charging>
format-charging-prefix = "CH"
format-charging-prefix-foreground = ${color.green}

; Available tags:
;   <label-discharging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-discharging>
format-discharging = <label-discharging>
format-discharging-prefix = "DC"
format-discharging-prefix-foreground = ${color.pink}

; Available tags:
;   <label-full> (default)
;   <bar-capacity>
;   <ramp-capacity>
format-full = <label-full>
format-full-prefix = "BF"
format-full-prefix-foreground = ${color.red}

label-charging = " %percentage%%"

label-discharging = " %percentage%% %time%"

label-full = " Full"
; label-full = " %percentage%%"
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_


[module/cpu]
type = internal/cpu

; Seconds to sleep between updates
; Default: 1
interval = 1

format = <label>
format-prefix = C
format-prefix-foreground = ${color.green}

; Available tokens:
;   %percentage% (default) - total cpu load averaged over all cores
;   %percentage-sum% - Cumulative load on all cores
;   %percentage-cores% - load percentage for each core
;   %percentage-core[1-9]% - load percentage for specific core
label = " %percentage%%"

[module/cpu2]
type = internal/cpu

interval = 1
warn-percentage = 60

format = <label>
format-prefix = CPU:
format-foreground = ${color.blue-gray}
label = " %percentage%%"
label-foreground = ${color.foreground}

label-warn = " %percentage%%"
format-warn = <label-warn>
format-warn-prefix = CPU:
format-warn-prefix-foreground = ${color.blue-gray}
label-warn-foreground = ${color.red}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/uk-bright]
type = custom/ipc
hook-0 = " " ; managed by uk-bright script
hook-1 = awk '{print $1 * 100}' /home/ukiran/.config/my_display/brightness
initial = 2 ;Hook to execute on launch hook-1
format-prefix = "L "
format = <label>
format-prefix-foreground = ${color.amber}
label = "%output%%"
click-left = rofi -show drun &
click-right = xfce4-terminal &
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/memory]
type = internal/memory

interval = 1

format = <label>
format-prefix = M
format-prefix-foreground = ${color.orange}

label = " %percentage_used%%"

[module/memory2]
type = internal/memory
interval = 1
warn-percentage = 60

format = <label>
format-prefix = MEM:
format-foreground = ${color.blue-gray}
label = " %percentage_used%%"
label-foreground = ${color.foreground}

label-warn = " %percentage_used%% (%gb_used%)"
format-warn = <label-warn>
format-warn-prefix = MEM:
format-warn-prefix-foreground = ${color.blue-gray}
label-warn-foreground = ${color.red}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

; If you use both a wired and a wireless network, just add 2 module definitions. For example
[module/wired-network]
type = internal/network
interface = enp4s0

[module/wireless-network]
type = internal/network
interface = wlp3s0

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/temperature]
type = internal/temperature
interval = 1

; Thermal zone to use
; To list all the zone types, run
; $ for i in /sys/class/thermal/thermal_zone*; do echo "$i: $(<$i/type)"; done
; Default: 0
thermal-zone = 0

; Full path of temperature sysfs path
; Use `sensors` to find preferred temperature source, then run
; $ for i in /sys/class/hwmon/hwmon*/temp*_input; do echo "$(<$(dirname $i)/name): $(cat ${i%_*}_label 2>/dev/null || echo $(basename ${i%_*})) $(readlink -f $i)"; done
; to find path to desired file
; Default reverts to thermal zone setting
hwmon-path = /sys/devices/pci0000:00/0000:00:1d.0/0000:02:00.0/nvme/nvme0/hwmon3/temp1_input

; Threshold temperature to display warning label (in degrees celsius)
; Default: 80
warn-temperature = 60

; Whether or not to show units next to the temperature tokens (°C, °F)
; Default: true
units = true

; Available tags:
;   <label> (default)
;   <ramp>
format = <label>
format-foreground = ${color.blue-gray}
; Available tags:
;   <label-warn> (default)
;   <ramp>
format-warn = <label-warn>

; Available tokens:
;   %temperature% (deprecated)
;   %temperature-c%   (default, temperature in °C)
;   %temperature-f%   (temperature in °F)
label = "%temperature-c%"

; Available tokens:
;   %temperature% (deprecated)
;   %temperature-c%   (default, temperature in °C)
;   %temperature-f%   (temperature in °F)
label-warn = "%temperature-c%"
label-warn-foreground = ${color.red}


;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/title]
type = internal/xwindow

; Available tags:
;   <label> (default)
format = <label>
; format-prefix = 
format-foreground = ${color.blue-gray}

; Available tokens:
;   %title%
;   %instance% (first part of the WM_CLASS atom, new in version 3.7.0)
;   %class%    (second part of the WM_CLASS atom, new in version 3.7.0)
; Default: %title%
; label = " %class% %title%"
label = "%class%"
label-maxlen = 30

; Used instead of label when there is no window title
; label-empty = " ~"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/workspaces]
type = internal/xworkspaces

; Only show workspaces defined on the same output as the bar
;
; Useful if you want to show monitor specific workspaces
; on different bars
;
; Default: false
pin-workspaces = true

; Create click handler used to focus desktop
; Default: true
enable-click = true

; Create scroll handlers used to cycle desktops
; Default: true
enable-scroll = true

; icon-[0-9]+ = <desktop-name>;<icon>
; NOTE: The desktop name needs to match the name configured by the WM
; You can get a list of the defined desktops using:
; $ xprop -root _NET_DESKTOP_NAMES
icon-0 = 1;
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;
icon-5 = 6;
icon-6 = 7;
icon-7 = 8;
icon-8 = 9;
icon-default = 
; icon-default = ▲

; Available tags:
;   <label-monitor>
;   <label-state> - gets replaced with <label-(active|urgent|occupied|empty)>
; Default: <label-state>
format = <label-state>

; Available tokens:
;   %name%
; Default: %name%
label-monitor = %name%

; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon%  %name%
;------------------------------

; label-active = [%name%]
; label-active-foreground = ${color.pink}

label-active = %name%
label-active-background = ${color.cyan}
label-active-foreground = ${color.sep}
; label-active-foreground = ${color.black}

;------------------------------
; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon%  %name%
label-occupied = +%name%
label-occupied-foreground = ${color.cyan}
; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon%  %name%
label-urgent = (%name%)
label-urgent-foreground = ${color.red}

; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon%  %name%
; label-empty = %name%
label-empty = ""

; label-empty-foreground = #ffffff
label-empty-foreground = ${color.sep}

label-active-padding = 1
label-urgent-padding = 1
label-occupied-padding = 1
label-empty-padding = 1


