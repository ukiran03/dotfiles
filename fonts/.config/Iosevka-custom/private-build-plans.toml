[buildPlans.Uosevka]
family = "Uosevka"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.Uosevka.variants.design]
one = "base"
g = "double-storey"
l = "serifed-diagonal-tailed"
tilde = "low"
asterisk = "penta-low"
caret = "medium"
ascii-grave = "straight"
ascii-single-quote = "straight"
brace = "straight"
guillemet = "curly"

[buildPlans.Uosevka.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Uosevka.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"

[buildPlans.Uosevka.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Uosevka.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.Uosevka.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.Uosevka.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Uosevka.weights.ExtraBold]
shape = 800
menu = 800
css = 800

[buildPlans.Uosevka.widths.Condensed]
shape = 500
menu = 3
css = "condensed"

[buildPlans.Uosevka.widths.Normal]
shape = 600
menu = 5
css = "normal"